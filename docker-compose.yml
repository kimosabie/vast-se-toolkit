services:
  vast-se-toolkit:
    build: .
    image: vast-se-toolkit:latest
    container_name: vast-se-toolkit
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
      - ./templates:/app/templates:ro
      - ./images:/app/images:ro
    environment:
      - TOOLKIT_DB_PATH=/app/data/toolkit.db
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
